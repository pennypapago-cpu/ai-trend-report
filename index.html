<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Penny AI 趨勢報告</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0d1b2a;color:#c8d8e8;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;padding:40px 20px}
  .topbar{height:4px;background:linear-gradient(90deg,#00d4ff,#7c3aed);position:fixed;top:0;left:0;right:0;z-index:99}
  h1{text-align:center;font-size:1.7rem;color:#00d4ff;margin:20px 0 6px;letter-spacing:.04em;font-weight:800}
  .subtitle{text-align:center;color:#5a8aaa;font-size:.88rem;margin-bottom:32px}
  .latest-btn{display:block;text-align:center;margin:0 auto 36px;background:#00d4ff;color:#0d1b2a;
    font-weight:800;font-size:1rem;padding:12px 32px;border-radius:8px;text-decoration:none;
    width:fit-content;transition:opacity .2s}
  .latest-btn:hover{opacity:.85}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;max-width:940px;margin:0 auto}
  .card{background:#111f30;border:1px solid #1e3450;border-radius:10px;padding:15px 16px;
        display:flex;flex-direction:column;gap:5px;text-decoration:none;color:inherit;
        transition:all .2s}
  .card:hover{border-color:#00d4ff;background:#162438;transform:translateY(-2px)}
  .card.latest{border-color:#00d4ff;background:#12263d}
  .card-date{font-size:.98rem;font-weight:700;color:#e8f4f8}
  .card-label{font-size:.75rem;color:#4a7a9a}
  .badge{display:inline-block;background:#00d4ff;color:#0d1b2a;font-size:.68rem;font-weight:800;
         padding:2px 8px;border-radius:20px;margin-top:3px;width:fit-content}
  footer{text-align:center;margin-top:48px;color:#2a3f58;font-size:.78rem}
</style>
</head>
<body>
<div class="topbar"></div>
<h1>📊 AI 趨勢與社群熱度分析</h1>
<p class="subtitle">每日自動更新 · 點擊查看完整報告</p>
<a class="latest-btn" href="AI趨勢與社群熱度分析_20260424.html">👉 查看最新報告（2026-04-24）</a>
<div class="grid" id="grid"></div>
<footer id="footer">pennypapago-cpu/ai-trend-report</footer>
<script>
const reports=[
  "20260424","20260423","20260422","20260421","20260420",
  "20260419","20260417","20260416","20260415","20260414",
  "20260413","20260412","20260411","20260410","20260409",
  "20260408","20260407","20260406","20260405","20260404","20260403"
];
const PREFIX="AI趨勢與社群熱度分析_";
const grid=document.getElementById('grid');
reports.forEach((d,i)=>{
  const iso=d.slice(0,4)+'-'+d.slice(4,6)+'-'+d.slice(6);
  grid.innerHTML+=`<a class="card${i===0?' latest':''}" href="${PREFIX}${d}.html">
    <div class="card-date">${iso}</div>
    <div class="card-label">AI趨勢 &amp; 社群熱度</div>
    ${i===0?'<span class="badge">最新</span>':''}
  </a>`;
});
document.getElementById('footer').textContent=
  `共 ${reports.length} 份報告 · 最後更新：${reports[0].slice(0,4)+'-'+reports[0].slice(4,6)+'-'+reports[0].slice(6)} · pennypapago-cpu/ai-trend-report`;
</script>
</body>
</html>
